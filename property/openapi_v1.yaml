openapi: 3.0.3
info:
  title: RentOut API
  version: v1
  description: Backend API for RentOut property platform.
paths:
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Login using either email or username in 'identifier'. Returns JWT
        refresh/access tokens on success.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '400':
          description: Invalid input or invalid credentials.
        '403':
          description: Email not verified.
        '429':
          description: Too many failed attempts.
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Logout current user. Returns ok_response envelope.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutOkResponse'
          description: ''
        '401':
          description: Authentication required.
  /api/v1/auth/password-reset/:
    post:
      operationId: auth_password_reset_create
      description: Request a password reset email. Returns ok_response envelope.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestOkResponse'
          description: ''
        '400':
          description: Validation error.
  /api/v1/auth/password-reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirmOkResponse'
          description: ''
        '400':
          description: Validation error.
  /api/v1/auth/phone/start/:
    post:
      operationId: auth_phone_start_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneOTPStart'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PhoneOTPStart'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PhoneOTPStart'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneOTPStartOkResponse'
          description: ''
  /api/v1/auth/phone/verify/:
    post:
      operationId: auth_phone_verify_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneOTPVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PhoneOTPVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PhoneOTPVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneOTPVerifyOkResponse'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Registration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Registration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Registration'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/Registration'
                required:
                - ok
                - data
          description: ''
  /api/v1/auth/register/apple/:
    post:
      operationId: auth_register_apple_create
      description: Register or log in with an Apple identity token. Returns JWT refresh
        and access tokens.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppleRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppleRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppleRegisterRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleRegisterResponse'
          description: ''
        '400':
          description: Missing or invalid Apple identity token.
  /api/v1/auth/register/google/:
    post:
      operationId: auth_register_google_create
      description: Register or log in with a Google ID token. Returns JWT refresh
        and access tokens.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GoogleRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GoogleRegisterRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleRegisterResponse'
          description: ''
        '400':
          description: Missing or invalid Google token.
  /api/v1/auth/resend-otp/:
    post:
      operationId: auth_resend_otp_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOTPResend'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailOTPResend'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailOTPResend'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailOTPResendOkResponse'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: Exchange a refresh token for a new access token. Returns ok_response
        envelope.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshOkResponse'
          description: ''
        '400':
          description: Invalid or expired refresh token.
  /api/v1/auth/verify-otp/:
    post:
      operationId: auth_verify_otp_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOTPVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailOTPVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailOTPVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailOTPVerifyOkResponse'
          description: ''
  /api/v1/bookings/:
    get:
      operationId: bookings_list
      description: List bookings for the authenticated user.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/PaginatedBookingListResponseList'
                required:
                - ok
                - data
          description: ''
    post:
      operationId: bookings_create
      description: GET my bookings / POST create (slot OR direct).
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Booking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Booking'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/Booking'
                required:
                - ok
                - data
          description: ''
  /api/v1/bookings/{booking_id}/reviews/:
    get:
      operationId: bookings_reviews_retrieve
      description: List booking reviews. Returns ok_response envelope.
      parameters:
      - in: path
        name: booking_id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingReviewListOkResponse'
          description: ''
  /api/v1/bookings/{booking_id}/reviews/create/:
    post:
      operationId: bookings_reviews_create_create
      description: Create a booking review. Returns ok_response envelope.
      parameters:
      - in: path
        name: booking_id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingReviewCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingReviewCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookingReviewCreate'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingReviewCreateOkResponse'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
        '404':
          description: Not found.
  /api/v1/bookings/{id}/:
    get:
      operationId: bookings_retrieve
      description: Retrieve a booking owned by the authenticated user.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponseEnvelope'
          description: ''
        '401':
          description: Authentication required.
        '404':
          description: Booking not found.
  /api/v1/bookings/{id}/cancel/:
    post:
      operationId: bookings_cancel_create
      description: Cancel a booking. Returns ok_response envelope.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingCancelOkResponse'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
        '404':
          description: Not found.
  /api/v1/bookings/{id}/delete/:
    delete:
      operationId: bookings_delete_destroy
      description: Delete a booking. Returns 204 or ok_response envelope depending
        on implementation.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Deleted.
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDeleteOkResponse'
          description: ''
        '401':
          description: Authentication required.
        '404':
          description: Not found.
  /api/v1/bookings/{id}/suspend/:
    post:
      operationId: bookings_suspend_create
      description: Suspend a booking. Returns ok_response envelope.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSuspendOkResponse'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
        '403':
          description: Forbidden.
        '404':
          description: Not found.
  /api/v1/bookings/create/:
    post:
      operationId: bookings_create_create
      description: Preflight validation for booking creation. Validates room, start/end
        datetimes, and checks for booking conflicts.
      parameters:
      - in: header
        name: Idempotency-Key
        schema:
          type: string
        description: Optional idempotency key to prevent duplicate booking creation.
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingPreflightRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingPreflightRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookingPreflightRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/BookingPreflightResponse'
                required:
                - ok
                - data
          description: ''
        '400':
          description: Missing/invalid fields or invalid datetime format.
        '401':
          description: Authentication required.
  /api/v1/category/:
    get:
      operationId: category_list
      description: Admin/staff can create/update/delete; others read active=True.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      tags:
      - category
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/PaginatedRoomCategorieList'
                required:
                - ok
                - data
          description: ''
    post:
      operationId: category_create
      description: Admin/staff can create/update/delete; others read active=True.
      tags:
      - category
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCategorie'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RoomCategorie'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RoomCategorie'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/RoomCategorie'
                required:
                - ok
                - data
          description: ''
  /api/v1/category/{id}/:
    get:
      operationId: category_retrieve
      description: Admin/staff can create/update/delete; others read active=True.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this room categorie.
        required: true
      tags:
      - category
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/RoomCategorie'
                required:
                - ok
                - data
          description: ''
    put:
      operationId: category_update
      description: Admin/staff can create/update/delete; others read active=True.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this room categorie.
        required: true
      tags:
      - category
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCategorie'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RoomCategorie'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RoomCategorie'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/RoomCategorie'
                required:
                - ok
                - data
          description: ''
    patch:
      operationId: category_partial_update
      description: Admin/staff can create/update/delete; others read active=True.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this room categorie.
        required: true
      tags:
      - category
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedRoomCategorie'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedRoomCategorie'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedRoomCategorie'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/RoomCategorie'
                required:
                - ok
                - data
          description: ''
    delete:
      operationId: category_destroy
      description: Admin/staff can create/update/delete; others read active=True.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this room categorie.
        required: true
      tags:
      - category
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/cities/:
    get:
      operationId: cities_retrieve
      description: List cities. Returns ok_response envelope.
      tags:
      - cities
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityListOkResponse'
          description: ''
  /api/v1/contact/:
    post:
      operationId: contact_create
      description: |-
        Public Contact Us endpoint.
        Used by the Contact Us form on the marketing site.
      tags:
      - contact
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactMessage'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContactMessage'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContactMessage'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/ContactMessage'
                required:
                - ok
                - data
          description: ''
  /api/v1/health/:
    get:
      operationId: health_retrieve
      description: Health check. Returns ok_response envelope.
      tags:
      - health
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckOkResponse'
          description: ''
  /api/v1/home/:
    get:
      operationId: home_retrieve
      description: Homepage summary. Returns ok_response envelope.
      tags:
      - home
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePageOkResponse'
          description: ''
  /api/v1/inbox/:
    get:
      operationId: inbox_retrieve
      description: List inbox items (merged notifications + message threads) wrapped
        in ok_response. Not paginated.
      tags:
      - inbox
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxListOkResponse'
          description: ''
  /api/v1/messages/stats/:
    get:
      operationId: messages_stats_retrieve
      description: Message stats (e.g. unread counts). Returns ok_response envelope.
      tags:
      - messages
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatsOkResponse'
          description: ''
  /api/v1/messages/threads/:
    get:
      operationId: messages_threads_list
      description: |-
        GET /api/messages/threads/

        Query params:
          - folder : inbox (default) | sent | bin | new | waiting_reply   # >>>
          - label  : filter by per-user label (Viewing scheduled, Good fit, etc.)
          - q      : search in message body or participant username
          - sort_by: latest (default) | oldest
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      tags:
      - messages
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/PaginatedMessageThreadList'
                required:
                - ok
                - data
          description: ''
    post:
      operationId: messages_threads_create
      description: |-
        GET /api/messages/threads/

        Query params:
          - folder : inbox (default) | sent | bin | new | waiting_reply   # >>>
          - label  : filter by per-user label (Viewing scheduled, Good fit, etc.)
