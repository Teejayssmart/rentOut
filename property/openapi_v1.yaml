openapi: 3.0.3
info:
  title: RentOut API
  version: v1
  description: Backend API for RentOut property platform.
paths:
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Login using either email or username in 'identifier'. Returns JWT
        refresh/access tokens on success.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginOkResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Logout current user. Returns ok_response envelope.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutOkResponse'
          description: ''
        '401':
          description: Authentication required.
  /api/v1/auth/password-reset/:
    post:
      operationId: auth_password_reset_create
      description: Request a password reset email. Returns ok_response envelope.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestOkResponse'
          description: ''
        '400':
          description: Validation error.
        '429':
          description: Rate limit exceeded.
  /api/v1/auth/password-reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: Confirm a password reset using email, token, and new password.
        Returns ok_response envelope.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirmOkResponse'
          description: ''
        '400':
          description: Validation error.
        '429':
          description: Rate limit exceeded.
  /api/v1/auth/phone/start/:
    post:
      operationId: auth_phone_start_create
      description: Start phone OTP verification by sending a 6-digit code.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneOTPStart'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PhoneOTPStart'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PhoneOTPStart'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneOTPStartOkResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '401':
          description: Authentication required.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/auth/phone/verify/:
    post:
      operationId: auth_phone_verify_create
      description: Verify a phone OTP code and mark the current user's phone number
        as verified.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneOTPVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PhoneOTPVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PhoneOTPVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneOTPVerifyOkResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '401':
          description: Authentication required.
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Registration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Registration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Registration'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/Registration'
                required:
                - ok
                - data
          description: ''
  /api/v1/auth/register/apple/:
    post:
      operationId: auth_register_apple_create
      description: Register or log in with an Apple identity token. Returns JWT refresh
        and access tokens.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppleRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppleRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppleRegisterRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleRegisterResponse'
          description: ''
        '400':
          description: Missing or invalid Apple identity token.
  /api/v1/auth/register/google/:
    post:
      operationId: auth_register_google_create
      description: Register or log in with a Google ID token. Returns JWT refresh
        and access tokens.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GoogleRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GoogleRegisterRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleRegisterResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleRegisterBadRequestResponse'
          description: ''
        '429':
          description: Rate limit exceeded.
  /api/v1/auth/resend-otp/:
    post:
      operationId: auth_resend_otp_create
      description: Resend a new email verification OTP code.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOTPResend'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailOTPResend'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailOTPResend'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailOTPResendOkResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: Exchange a refresh token for a new access token. Returns ok_response
        envelope.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshOkResponse'
          description: ''
        '400':
          description: Invalid or expired refresh token.
  /api/v1/auth/verify-otp/:
    post:
      operationId: auth_verify_otp_create
      description: Verify a 6-digit email OTP code and mark the user's email as verified.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOTPVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailOTPVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailOTPVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailOTPVerifyOkResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/bookings/:
    get:
      operationId: bookings_list
      description: GET my bookings / POST create (slot OR direct).
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/PaginatedBookingList'
                required:
                - ok
                - data
          description: ''
    post:
      operationId: bookings_create
      description: GET my bookings / POST create (slot OR direct).
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/BookingCreateRequest'
                required:
                - ok
                - data
          description: ''
  /api/v1/bookings/{id}/:
    get:
      operationId: bookings_retrieve
      description: GET /api/bookings/<id>/ â†’ see my booking
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/Booking'
                required:
                - ok
                - data
          description: ''
  /api/v1/bookings/{id}/cancel/:
    post:
      operationId: bookings_cancel_create
      description: Cancel a booking. Returns ok_response envelope.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingCancelResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v1/bookings/{id}/delete/:
    delete:
      operationId: bookings_delete_destroy
      description: Delete a booking.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/BookingDeleteResponse'
                required:
                - ok
                - data
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v1/bookings/{id}/suspend/:
    post:
      operationId: bookings_suspend_create
      description: Suspend a booking. Returns ok_response envelope.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSuspendResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v1/bookings/create/:
    post:
      operationId: bookings_create_create
      description: Preflight validation for booking creation. Validates room, start/end
        datetimes, and checks for booking conflicts.
      parameters:
      - in: header
        name: Idempotency-Key
        schema:
          type: string
        description: Optional idempotency key to prevent duplicate booking creation.
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingPreflightRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingPreflightRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookingPreflightRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/BookingPreflightResponse'
                required:
                - ok
                - data
          description: ''
        '400':
          description: Missing/invalid fields or invalid datetime format.
        '401':
          description: Authentication required.
  /api/v1/cities/:
    get:
      operationId: cities_retrieve
      description: List cities. Returns ok_response envelope. Supports optional filtering
        with the 'q' query parameter.
      parameters:
      - in: query
        name: q
        schema:
          type: string
        description: Filter cities by case-insensitive substring.
      tags:
      - cities
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityListOkResponse'
          description: ''
  /api/v1/contact/:
    post:
      operationId: contact_create
      description: |-
        Public Contact Us endpoint.
        Used by the Contact Us form on the marketing site.
      tags:
      - contact
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactMessage'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContactMessage'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContactMessage'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/ContactMessage'
                required:
                - ok
                - data
          description: ''
  /api/v1/health/:
    get:
      operationId: health_retrieve
      description: Health check endpoint.
      tags:
      - health
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/HealthCheckResponse'
                required:
                - ok
                - data
          description: ''
  /api/v1/home/:
    get:
      operationId: home_retrieve
      description: Return homepage summary data including featured rooms, latest rooms,
        popular cities, stats, and app links.
      tags:
      - home
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePageOkResponse'
          description: ''
  /api/v1/inbox/:
    get:
      operationId: inbox_retrieve
      description: List inbox items (merged notifications and message threads) wrapped
        in ok_response. Not paginated.
      tags:
      - inbox
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxListOkResponse'
          description: ''
  /api/v1/messages/stats/:
    get:
      operationId: messages_stats_retrieve
      description: Return message statistics for the authenticated user, including
        total threads, total unread messages, and good-fit thread counts.
      tags:
      - messages
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/MessageStatsResponse'
                required:
                - ok
                - data
          description: ''
  /api/v1/messages/threads/:
    get:
      operationId: messages_threads_list
      description: |-
        GET /api/messages/threads/

        Query params:
          - folder : inbox (default) | sent | bin | new | waiting_reply
          - label  : filter by per-user label (Viewing scheduled, Good fit, etc.)
          - q      : search in message body or participant username
          - sort_by: latest (default) | oldest
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      tags:
      - messages
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/PaginatedMessageThreadList'
                required:
                - ok
                - data
          description: ''
    post:
      operationId: messages_threads_create
      description: |-
        GET /api/messages/threads/

        Query params:
          - folder : inbox (default) | sent | bin | new | waiting_reply
          - label  : filter by per-user label (Viewing scheduled, Good fit, etc.)
          - q      : search in message body or participant username
          - sort_by: latest (default) | oldest
      tags:
      - messages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageThread'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MessageThread'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MessageThread'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  data:
                    $ref: '#/components/schemas/MessageThread'
                required:
                - ok
                - data
          description: ''
  /api/v1/messages/threads/{thread_id}/bin/:
    post:
      operationId: messages_threads_bin_create
      description: Move a thread to bin (per-user).
      parameters:
      - in: path
        name: thread_id
        schema:
          type: integer
        required: true
      tags:
      - messages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreadMoveToBinRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ThreadMoveToBinRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ThreadMoveToBinRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadMoveToBinResponse'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
        '404':
          description: Thread not found.
  /api/v1/messages/threads/{thread_id}/label/:
    post:
      operationId: messages_threads_label_create
      description: Set per-user label for a message thread.
      parameters:
      - in: path
        name: thread_id
        schema:
          type: integer
        required: true
      tags:
      - messages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreadSetLabelRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ThreadSetLabelRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ThreadSetLabelRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadSetLabelResponse'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
        '404':
          description: Thread not found.
  /api/v1/messages/threads/{thread_id}/messages/:
    get:
      operationId: messages_threads_messages_list
      parameters:
      - name: limit
